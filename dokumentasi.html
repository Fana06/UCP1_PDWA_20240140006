<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumentasi</title>
</head>
<body>
    <h1>Dokumentasi Umum</h1>
    <p>Ini adalah halaman dokumentasi umum untuk komunitas kami.</p>
</body>
    <div>
        <picture>
        <source srcset="gambar1.webp" type="image/webp">
        <source srcset="gambar1.jpg" type="image/jpeg">
        <img src="gambar1.jpg" alt="Gambar Dokumentasi" style="width:100%;">
        </picture>
    </div>
    
    <div>
        <video controls>
        <source src="video1.mp4" type="video/mp4">
        <source src="video1.webm" type="video/webm">
        Browser Anda tidak mendukung tag video.
    </div>

    <div>
        <audio controls>
        <source src="audio1.mp3" type="audio/mpeg">
        <source src="audio1.ogg" type="audio/ogg">
        Browser Anda tidak mendukung tag audio.
    </div>
</html>
